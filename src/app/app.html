<mat-toolbar color="primary" class="toolbar">
  <!-- Mobile Menu -->
  <button mat-icon-button class="mobile-menu-button" [matMenuTriggerFor]="mobileMenu">
    <mat-icon>menu</mat-icon>
  </button>

  <!-- Desktop Menu -->
  <div class="desktop-menu">
    <a
      mat-button
      class="btn"
      routerLink="/"
      routerLinkActive="active-link"
      [routerLinkActiveOptions]="{ exact: true }"
      >Home</a
    >

    <span class="spacer"></span>

    <a mat-button class="btn" routerLink="/about" routerLinkActive="active-link">About</a>

    <a mat-button class="btn" routerLink="/skills" routerLinkActive="active-link">Skills</a>

    <a mat-button class="btn" routerLink="/contact" routerLinkActive="active-link">Contact</a>
  </div>
</mat-toolbar>

<!-- Mobile Dropdown Menu -->

<mat-menu #mobileMenu="matMenu">
  <a
    mat-menu-item
    class="btn"
    routerLink="/"
    routerLinkActive="active-link"
    [routerLinkActiveOptions]="{ exact: true }"
    >Home</a
  >
  <a mat-menu-item class="btn" routerLink="/about" routerLinkActive="active-link">About</a>
  <a mat-menu-item class="btn" routerLink="/skills" routerLinkActive="active-link">Skills</a>
  <a mat-menu-item class="btn" routerLink="/contact" routerLinkActive="active-link">Contact</a>
</mat-menu>

<main class="content">
  <router-outlet />

  <floating-actions />
</main>
