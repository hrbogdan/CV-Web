<div class="floating-buttons">
  <button mat-fab color="primary" (click)="showHelp()">
    <mat-icon>help</mat-icon>
  </button>
  <button mat-fab color="accent" (click)="scrollToTop()">
    <mat-icon>keyboard_arrow_up</mat-icon>
  </button>
  <button mat-fab color="accent" (click)="scrollToBottom()">
    <mat-icon>keyboard_arrow_down</mat-icon>
  </button>
</div>
